<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Saved Consulting Deals - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/styles.css" />

<style>
.saved-wrapper {
  margin-left: 260px;
  padding: 2rem;
  color: #e5e7eb;
}

h1 {
  margin-bottom: 1rem;
}

.deals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}

.deal-card {
  background: #0b1220;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 1rem;
}

.deal-title {
  font-weight: 800;
  color: #00b4d8;
  margin-bottom: 0.6rem;
  font-size: 0.9rem;
}

.deal-body {
  font-size: 0.85rem;
  line-height: 1.6;
  opacity: 0.9;
}

.deal-actions {
  display: flex;
  gap: 10px;
  margin-top: 1rem;
}

.edit-btn {
  flex: 1;
  padding: 0.6rem;
  border-radius: 10px;
  border: 1px solid rgba(0,180,216,0.4);
  background: rgba(0,180,216,0.1);
  color: #00b4d8;
  font-weight: 700;
  cursor: pointer;
}

.delete-btn {
  flex: 1;
  padding: 0.6rem;
  border-radius: 10px;
  border: 1px solid rgba(255,0,0,0.3);
  background: rgba(255,0,0,0.1);
  color: #ff6b6b;
  font-weight: 700;
  cursor: pointer;
}

.empty {
  padding: 2rem;
  text-align: center;
  opacity: 0.6;
}
</style>

</head>

<body>

<div class="saved-wrapper">

  <h1>Saved Consulting Deals</h1>

  <div id="savedDealsContainer" class="deals-grid"></div>

  <div id="emptyState" class="empty" style="display:none;">
    No consulting deals yet.
  </div>

</div>

<script src="js/savedDealsConsulting.js"></script>

</body>
</html>
