<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/loader.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

/* GOOGLE BUTTON */

.google-real-btn{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:#111;
color:white;
font-weight:600;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
transition:.2s;
}

.google-real-btn:hover{
background:#1a1a1a;
}

/* OVERLAY */

#g-overlay{
position:fixed;
inset:0;
background:rgba(3,10,20,0.94);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.g-wrap{
position:relative;
width:110px;
height:110px;
display:flex;
align-items:center;
justify-content:center;
}

.g-ring{
position:absolute;
inset:0;
border-radius:50%;
border:2.5px solid rgba(0,213,255,0.1);
border-top-color:#00d5ff;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.g-logo{
width:56px;
}

</style>

</head>
<body>

<div class="auth-container">
<div class="auth-card">

<h1>Welcome back</h1>

<!-- GOOGLE -->

<div class="google-auth">

<button id="googleBtn" class="google-real-btn">
Continue with Google
</button>

</div>

<div class="auth-divider">or continue with email</div>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit" class="auth-submit">
Sign in
</button>

<p id="msg"></p>

</form>

</div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>

/* overlay */

function showOverlay(){

const o=document.createElement("div");
o.id="g-overlay";

o.innerHTML=`
<div class="g-wrap">
<div class="g-ring"></div>
<img src="images/Untitled design.png" class="g-logo">
</div>
`;

document.body.appendChild(o);

return o;
}

/* GOOGLE CLICK */

document.getElementById("googleBtn")
.addEventListener("click",()=>{

google.accounts.id.initialize({
client_id:
"1064963647591-k76sv5dgcm3ihrsbmaccr63rij0vikda.apps.googleusercontent.com",
callback:handleGoogleLogin
});

google.accounts.id.prompt();

});

/* GOOGLE LOGIN */

async function handleGoogleLogin(response){

const overlay=showOverlay();

try{

const res=await fetch(
window.api.base + "/api/auth/google",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
token:response.credential
})
}
);

const data=await res.json();

window.auth.setToken(data.token);

location.href="dashboard.html";

}catch(e){

overlay.remove();
msg.textContent="Google login failed";

}

}

/* EMAIL LOGIN */

loginForm.addEventListener("submit", async e=>{

e.preventDefault();

const overlay=showOverlay();

try{

const data = await window.api.loginRequest(
email.value,
password.value
);

window.auth.setToken(data.token);

location.href="dashboard.html";

}catch(err){

overlay.remove();
msg.textContent="Login failed";

}

});

</script>

</body>
</html>
