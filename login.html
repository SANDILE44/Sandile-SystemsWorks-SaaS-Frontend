<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/loader.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
/* ── GOOGLE OVERLAY ── */
#g-overlay {
  position: fixed;
  inset: 0;
  background: rgba(3,10,20,0.94);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 0;
  animation: gFadeIn 0.35s ease forwards;
}

@keyframes gFadeIn {
  to { opacity: 1; }
}

#g-overlay.fade-out {
  animation: gFadeOut 0.4s ease forwards;
}

@keyframes gFadeOut {
  to { opacity: 0; pointer-events: none; }
}

.g-wrap {
  position: relative;
  width: 110px;
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SPINNING RING */
.g-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2.5px solid rgba(0,213,255,0.1);
  border-top-color: #00d5ff;
  animation: gSpin 0.85s linear infinite;
  box-shadow: 0 0 24px rgba(0,213,255,0.15);
}

@keyframes gSpin {
  to { transform: rotate(360deg); }
}

/* LOGO */
.g-logo {
  width: 56px;
  height: 56px;
  object-fit: contain;
  mix-blend-mode: screen;
  position: relative;
  z-index: 1;
  animation: gLogoPulse 1.4s ease-in-out infinite;
}

@keyframes gLogoPulse {
  0%, 100% { filter: drop-shadow(0 0 12px rgba(0,213,255,0.5)); }
  50%       { filter: drop-shadow(0 0 30px rgba(0,213,255,1));   }
}

/* GLOW BEHIND LOGO */
.g-glow {
  position: absolute;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,213,255,0.12) 0%, transparent 70%);
  animation: gGlowPulse 1.4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes gGlowPulse {
  0%, 100% { transform: scale(1);    opacity: 0.7; }
  50%       { transform: scale(1.2); opacity: 1;   }
}

/* SUCCESS STATE — checkmark */
.g-check-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.g-check-wrap.show {
  opacity: 1;
}

.g-circle {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2.5px solid #00e87a;
  transform: scale(0);
  animation: none;
}

.g-circle.pop {
  animation: gCirclePop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards,
             gCircleGlow 1.2s ease-in-out infinite 0.4s;
}

@keyframes gCirclePop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

@keyframes gCircleGlow {
  0%, 100% { box-shadow: 0 0 16px rgba(0,232,122,0.3); }
  50%       { box-shadow: 0 0 44px rgba(0,232,122,0.8); }
}

.g-check-svg {
  width: 38px;
  height: 38px;
  stroke: #00e87a;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 0 8px rgba(0,232,122,0.9));
}

.g-check-path {
  stroke-dasharray: 50;
  stroke-dashoffset: 50;
}

.g-check-path.draw {
  animation: gDraw 0.45s ease forwards 0.2s;
}

@keyframes gDraw {
  to { stroke-dashoffset: 0; }
}
</style>

</head>
<body>

<header class="header">
<div class="container">
<div class="header-inner">

<div class="brand">
<a href="index.html" style="display:flex;align-items:center;gap:.65rem;min-width:220px;">
<img src="images/Untitled design.png" alt="Logo" class="brand-logo">
<span class="brand-name">Sandile SystemsWorks</span>
</a>
</div>

<div class="header-actions">
<a href="signup.html" class="btn btn-primary">Start free trial</a>
</div>

</div>
</div>
</header>

<div class="auth-container">
<div class="auth-card">

<div class="auth-head">
<img src="images/Untitled design.png" alt="Logo" class="auth-logo">
<div>
<h1>Welcome back</h1>
<p>Sign in to your Sandile SystemsWorks account.</p>
</div>
</div>

<!-- GOOGLE LOGIN -->
<div class="google-auth">
<div id="g_id_onload"
  data-client_id="1064963647591-k76sv5dgcm3ihrsbmaccr63rij0vikda.apps.googleusercontent.com"
  data-context="signin"
  data-callback="handleGoogleLogin"
  data-auto_prompt="false">
</div>
<div class="google-btn-wrapper">
<div class="g_id_signin"
  data-type="standard"
  data-size="large"
  data-theme="filled_black"
  data-text="signin_with"
  data-shape="pill"
  data-logo_alignment="left">
</div>
</div>
</div>

<div class="auth-divider">or continue with email</div>

<!-- EMAIL LOGIN -->
<form id="loginForm">
<div class="form-group">
<label for="email">Email address</label>
<input type="email" id="email" placeholder="your@email.com" required>
</div>
<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" placeholder="Your password" required>
</div>
<button type="submit" class="auth-submit">Sign in</button>
<p id="msg"></p>
</form>

<div class="auth-footer">
Don't have an account? <a href="signup.html">Create one</a>
</div>

</div>
</div>

<!-- GLOBAL LOADER -->
<div id="global-loader" class="loader-overlay hidden">
<div class="loader-spinner"></div>
<p>Please wait…</p>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>

/* ── MESSAGE ── */
const loginForm = document.getElementById('loginForm');
const msg = document.getElementById('msg');

function showMsg(text, type='') {
  msg.textContent = text;
  msg.className = type;
  msg.style.display = text ? 'block' : 'none';
}

/* ── WAKE SERVER ── */
window.addEventListener('load', () => {
  if (window.API_BASE) fetch(window.API_BASE + '/health').catch(() => {});
});

/* ── EMAIL LOGIN ── */
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = loginForm.querySelector('button');
  showMsg('');
  if (!email)    return showMsg('Enter your email', 'error');
  if (!password) return showMsg('Enter your password', 'error');
  btn.disabled = true;
  window.loader.show('Signing you in...');
  try {
    const data = await window.api.loginRequest(email, password);
    if (!data?.token) throw new Error('Login failed');
    window.auth.setToken(data.token);
    window.location.replace('dashboard.html');
  } catch (err) {
    window.loader.hide();
    btn.disabled = false;
    showMsg(err.message || 'Login failed', 'error');
  }
});

/* ── GOOGLE OVERLAY ── */
function showGoogleOverlay() {
  const overlay = document.createElement('div');
  overlay.id = 'g-overlay';

  const glow = document.createElement('div');
  glow.className = 'g-glow';

  const wrap = document.createElement('div');
  wrap.className = 'g-wrap';

  const ring = document.createElement('div');
  ring.className = 'g-ring';

  const logo = document.createElement('img');
  logo.src = 'images/Untitled design.png';
  logo.alt = 'Logo';
  logo.className = 'g-logo';

  const checkWrap = document.createElement('div');
  checkWrap.className = 'g-check-wrap';

  const circle = document.createElement('div');
  circle.className = 'g-circle';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 38 38');
  svg.classList.add('g-check-svg');

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M8 20 l8 8 l14 -16');
  path.classList.add('g-check-path');

  svg.appendChild(path);
  circle.appendChild(svg);
  checkWrap.appendChild(circle);

  wrap.appendChild(ring);
  wrap.appendChild(logo);
  wrap.appendChild(checkWrap);
  overlay.appendChild(glow);
  overlay.appendChild(wrap);
  document.body.appendChild(overlay);

  return { overlay, ring, logo, checkWrap, circle, path };
}

function triggerSuccess({ overlay, ring, logo, checkWrap, circle, path }) {
  /* stop spinner, hide logo */
  ring.style.animation = 'none';
  ring.style.opacity   = '0';
  ring.style.transition = 'opacity 0.3s ease';
  logo.style.animation = 'none';
  logo.style.transition = 'opacity 0.3s ease';
  logo.style.opacity   = '0';

  /* show checkmark */
  setTimeout(() => {
    checkWrap.classList.add('show');
    circle.classList.add('pop');
    path.classList.add('draw');
  }, 300);

  /* fade out and remove */
  setTimeout(() => {
    overlay.classList.add('fade-out');
    setTimeout(() => overlay.remove(), 400);
  }, 1400);
}

/* ── GOOGLE LOGIN ── */
async function handleGoogleLogin(response) {
  const elements = showGoogleOverlay();

  try {
    const googleToken = response.credential;
    const data = await window.api.apiFetch('/api/auth/google', {
      method: 'POST',
      body: { token: googleToken }
    });

    if (!data?.token) throw new Error('Google login failed');

    window.auth.setToken(data.token);

    triggerSuccess(elements);

    setTimeout(() => {
      window.location.replace('dashboard.html');
    }, 1500);

  } catch (err) {
    elements.overlay.remove();
    console.error(err);
    showMsg('Google login failed', 'error');
  }
}

</script>
</body>
</html>
