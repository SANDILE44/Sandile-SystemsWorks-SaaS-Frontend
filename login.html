<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Sandile SystemsWorks</title>

    <link rel="stylesheet" href="css/landing.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/loader.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <div class="header-inner">
          <div class="brand">
            <a href="index.html" style="display:flex;align-items:center;gap:.65rem;min-width:220px;">
              <img src="images/Untitled design.png" alt="Logo" class="brand-logo" />
              <span class="brand-name">Sandile SystemsWorks</span>
            </a>
          </div>

          <div class="header-actions">
            <a href="signup.html" class="btn btn-primary">Start free trial</a>
          </div>
        </div>
      </div>
    </header>

    <!-- AUTH CONTAINER -->
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-head">
          <img src="images/Untitled design.png" alt="Logo" class="auth-logo" />
          <div>
            <h1>Welcome back</h1>
            <p>Sign in to your Sandile SystemsWorks account.</p>
          </div>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="your@email.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" required />
          </div>

          <button type="submit" class="auth-submit">Sign in</button>

          <p id="msg"></p>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Create one</a>
        </div>
      </div>
    </div>



    <!-- GLOBAL LOADER -->
    <div id="global-loader" class="loader-overlay hidden">
      <div class="loader-spinner"></div>
      <p>Please wait…</p>
    </div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/loader.js"></script>

    <script>
      const loginForm = document.getElementById('loginForm');
      const msg = document.getElementById('msg');

      function showMsg(text, type = '') {
        msg.textContent = text;
        msg.className = type;
        msg.style.display = text ? 'block' : 'none';
      }

      /* =========================
         SPEED BOOST #1 — WAKE SERVER
      ========================= */
      window.addEventListener('load', () => {
        if (window.API_BASE) {
          fetch(`${window.API_BASE}/health`).catch(() => {});
        }
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = loginForm.querySelector('button[type="submit"]');

        showMsg('');
        btn.disabled = true;

        window.loader.show('Signing you in…');

        try {
          const data = await window.api.loginRequest(email, password);

          if (!data?.token) throw new Error('Login failed');

          window.auth.setToken(data.token);
          window.location.href = 'dashboard.html';
        } catch (err) {
          window.loader.hide();
          btn.disabled = false;
          showMsg(err.message || 'Login failed', 'error');
        }
      });
    </script>
  </body>
  </html>
