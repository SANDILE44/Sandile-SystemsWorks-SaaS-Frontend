<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/loader.css">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V1M5L4408K"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-V1M5L4408K');
</script>

<!-- Google Sign-In -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <div class="brand">
        <a href="index.html" style="display:flex;align-items:center;gap:.65rem;min-width:220px;">
          <img src="images/Untitled design.png" alt="Logo" class="brand-logo">
          <span class="brand-name">Sandile SystemsWorks</span>
        </a>
      </div>
      <div class="header-actions">
        <a href="signup.html" class="btn btn-primary">Start free trial</a>
      </div>
    </div>
  </div>
</header>

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-head">
      <img src="images/Untitled design.png" alt="Logo" class="auth-logo">
      <div>
        <h1>Welcome back</h1>
        <p>Sign in to your Sandile SystemsWorks account.</p>
      </div>
    </div>

    <!-- GOOGLE LOGIN BUTTON (Instant) -->
    <div class="google-auth">
      <button id="googleSignInBtn" class="btn btn-google">
        <img src="images/google-logo.png" alt="Google Logo" style="width:20px;margin-right:8px;">
        Sign in with Google
      </button>
    </div>

    <div class="auth-divider">or continue with email</div>

    <!-- EMAIL LOGIN -->
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="auth-submit">Sign in</button>
      <p id="msg"></p>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>

  </div>
</div>

<!-- GLOBAL LOADER -->
<div id="global-loader" class="loader-overlay hidden">
  <div class="loader-spinner"></div>
  <p>Please wait…</p>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/loader.js"></script>

<script>
/* ── GOOGLE SIGN-IN HANDLER ── */
function handleGoogleLogin(credential) {
  fetch('/api/auth/google', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: credential })
  })
  .then(res => res.json())
  .then(data => {
    if(data.token) {
      localStorage.setItem('jwt', data.token);
      window.location.href = '/dashboard.html';
    } else {
      alert(data.error || 'Google login failed');
    }
  })
  .catch(err => console.error('Google login error:', err));
}

/* ── INSTANT BUTTON CLICK ── */
document.getElementById('googleSignInBtn').addEventListener('click', () => {
  google.accounts.id.initialize({
    client_id: '1064963647591-k76sv5dgcm3ihrsbmaccr63rij0vikda.apps.googleusercontent.com',
    callback: (res) => handleGoogleLogin(res.credential)
  });
  google.accounts.id.prompt(); // shows Google popup
});

/* ── IN-APP BROWSER DETECTION ── */
window.addEventListener('load', () => {
  const ua = navigator.userAgent || '';
  const isInApp = /TikTok|BytedanceWebview|Instagram|FBAN|FBAV|Twitter|Line|MicroMessenger/i.test(ua);

  if (isInApp) {
    const googleAuth = document.querySelector('.google-auth');
    if (googleAuth) {
      googleAuth.innerHTML = `
        <div style="
          background: rgba(255,184,0,0.08);
          border: 1px solid rgba(255,184,0,0.2);
          border-radius: 12px;
          padding: 14px 16px;
          font-size: 0.85rem;
          color: #ffb800;
          font-weight: 600;
          line-height: 1.5;
          text-align: center;
        ">
          ⚠️ Open in Chrome or Safari to use Google Sign-In
        </div>
      `;
    }
  }
});
</script>

</body>
</html>
