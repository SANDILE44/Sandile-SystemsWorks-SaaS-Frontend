<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Promo Builder</title>
<style>
  body {
    margin: 0;
    background: #0b0f1a;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .scene-container {
    width: 360px;
    height: 640px;
    margin: 20px;
    background: #111427;
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    perspective: 1000px;
  }

  .phone-frame {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transform: rotateY(0deg);
    transition: transform 0.8s;
  }

  .scene-video, .scene-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .text-overlay {
    position: absolute;
    top: 10%;
    left: 10%;
    right: 10%;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    background: #16c79a;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  input[type="text"] {
    padding: 5px;
    width: 200px;
    border-radius: 5px;
    border: none;
  }
</style>
</head>
<body>

<h1>3D Promo Builder</h1>

<div id="scenes-wrapper"></div>

<div class="controls">
  <button onclick="prevScene()">⬅️ Previous Scene</button>
  <button onclick="nextScene()">Next Scene ➡️</button>
  <button onclick="exportVideo()">Export Video</button>
</div>

<script>
  // --- Scene Data ---
  const sceneCount = 5;
  let currentScene = 0;
  const scenes = Array.from({length: sceneCount}, (_, i) => ({
    text: `Scene ${i+1} text`,
    video: null, // URL from upload
    image: null // fallback if video not uploaded
  }));

  const wrapper = document.getElementById('scenes-wrapper');

  function renderScene(index) {
    wrapper.innerHTML = '';
    const sceneData = scenes[index];

    const container = document.createElement('div');
    container.className = 'scene-container';

    const phone = document.createElement('div');
    phone.className = 'phone-frame';

    // video or image
    const media = document.createElement(sceneData.video ? 'video' : 'img');
    media.className = sceneData.video ? 'scene-video' : 'scene-image';
    media.src = sceneData.video || sceneData.image || '';
    if(sceneData.video) media.autoplay = true;
    if(sceneData.video) media.loop = true;
    phone.appendChild(media);

    // text overlay
    const text = document.createElement('div');
    text.className = 'text-overlay';
    text.contentEditable = true;
    text.innerText = sceneData.text;
    text.addEventListener('input', e => scenes[index].text = e.target.innerText);
    phone.appendChild(text);

    // upload button
    const uploadBtn = document.createElement('input');
    uploadBtn.type = 'file';
    uploadBtn.accept = 'video/*,image/*';
    uploadBtn.onchange = e => {
      const file = e.target.files[0];
      if(file) {
        const url = URL.createObjectURL(file);
        if(file.type.includes('video')) {
          sceneData.video = url;
          sceneData.image = null;
        } else {
          sceneData.image = url;
          sceneData.video = null;
        }
        renderScene(index); // re-render to show media
      }
    };
    container.appendChild(uploadBtn);

    container.appendChild(phone);
    wrapper.appendChild(container);
  }

  function prevScene() {
    if(currentScene > 0) currentScene--;
    renderScene(currentScene);
  }

  function nextScene() {
    if(currentScene < sceneCount - 1) currentScene++;
    renderScene(currentScene);
  }

  function exportVideo() {
    alert("Here we would merge all scenes into one video file for gallery download.");
    // You will need a JS library like Whammy.js, CCapture.js, or FFmpeg WASM to actually merge
  }

  // Initial render
  renderScene(currentScene);
</script>

</body>
</html>
