<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Promo Builder</title>

<style>
body{
margin:0;
background:#0b0f1a;
font-family:Arial;
overflow:hidden;
}

.stage{
width:100vw;
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.text{
position:absolute;
left:8%;
top:40%;
color:white;
font-size:42px;
font-weight:bold;
width:40%;
transition:0.5s;
}

.phone{
position:absolute;
right:8%;
width:280px;
}

.screen{
position:absolute;
right:8%;
width:240px;
top:50%;
transform:translateY(-50%);
border-radius:20px;
overflow:hidden;
}

.screen video{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div class="stage">

<div class="text" id="text">
Most businesses lose money
</div>

<img src="assets/phone.png" class="phone">

<div class="screen">
<video id="video" autoplay muted></video>
</div>

</div>

<script>

const scenes = [

{
text: "Most businesses lose money\nwithout knowing",
video: "assets/scene1.mp4"
},

{
text: "See real profit\nbefore saying yes",
video: "assets/scene2.mp4"
},

{
text: "Detect losses\ninstantly",
video: "assets/scene3.mp4"
},

{
text: "Know when to\nREJECT a deal",
video: "assets/scene4.mp4"
},

{
text: "Free demo available\n3-day free trial",
video: "assets/scene5.mp4"
}

];

let i = 0;
const text = document.getElementById("text");
const video = document.getElementById("video");

function playScene(){

text.innerText = scenes[i].text;
video.src = scenes[i].video;
video.play();

i++;

if(i >= scenes.length){
i = 0;
}

}

playScene();

setInterval(playScene, 5000);

</script>

</body>
</html>
