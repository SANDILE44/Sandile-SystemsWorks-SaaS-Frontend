/* ── GOOGLE OVERLAY ── */  
#g-overlay {  
  position: fixed;  
  inset: 0;  
  background: rgba(3,10,20,0.94);  
  backdrop-filter: blur(10px);  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  z-index: 9999;  
  opacity: 0;  
  animation: gFadeIn 0.35s ease forwards;  
}  
  
@keyframes gFadeIn {  
  to { opacity: 1; }  
}  
  
#g-overlay.fade-out {  
  animation: gFadeOut 0.4s ease forwards;  
}  
  
@keyframes gFadeOut {  
  to { opacity: 0; pointer-events: none; }  
}  
  
.g-wrap {  
  position: relative;  
  width: 110px;  
  height: 110px;  
  display: flex;  
  align-items: center;  
  justify-content: center;  
}  
  
.g-ring {  
  position: absolute;  
  inset: 0;  
  border-radius: 50%;  
  border: 2.5px solid rgba(0,213,255,0.1);  
  border-top-color: #00d5ff;  
  animation: gSpin 0.85s linear infinite;  
  box-shadow: 0 0 24px rgba(0,213,255,0.15);  
}  
  
@keyframes gSpin {  
  to { transform: rotate(360deg); }  
}  
  
.g-logo {  
  width: 56px;  
  height: 56px;  
  object-fit: contain;  
  mix-blend-mode: screen;  
  position: relative;  
  z-index: 1;  
  animation: gLogoPulse 1.4s ease-in-out infinite;  
}  
  
@keyframes gLogoPulse {  
  0%, 100% { filter: drop-shadow(0 0 12px rgba(0,213,255,0.5)); }  
  50%       { filter: drop-shadow(0 0 30px rgba(0,213,255,1));   }  
}  
  
.g-glow {  
  position: absolute;  
  width: 200px;  
  height: 200px;  
  border-radius: 50%;  
  background: radial-gradient(circle, rgba(0,213,255,0.12) 0%, transparent 70%);  
  animation: gGlowPulse 1.4s ease-in-out infinite;  
  pointer-events: none;  
}  
  
@keyframes gGlowPulse {  
  0%, 100% { transform: scale(1);   opacity: 0.7; }  
  50%       { transform: scale(1.2); opacity: 1;   }  
}  
  
.g-check-wrap {  
  position: absolute;  
  inset: 0;  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  opacity: 0;  
  transition: opacity 0.3s ease;  
}  
  
.g-circle {  
  position: absolute;  
  inset: 0;  
  border-radius: 50%;  
  border: 2.5px solid #00e87a;  
  transform: scale(0);  
}  
  
.g-check-svg {  
  width: 40px;  
  height: 40px;  
  stroke: #00e87a;  
  stroke-width: 2.5;  
  stroke-linecap: round;  
  stroke-linejoin: round;  
  fill: none;  
  position: relative;  
  z-index: 1;  
  filter: drop-shadow(0 0 8px rgba(0,232,122,0.9));  
}  
  
.g-check-path {  
  stroke-dasharray: 30;  
  stroke-dashoffset: 30;  
  transition: stroke-dashoffset 0.45s ease 0.2s;  
}  
</style>  </head>

</div>  <script src="js/config.js"></script>  <script src="js/api.js"></script>  <script src="js/auth.js"></script>  <script>  
  
/* ── MESSAGE ── */  
const signupForm = document.getElementById('signupForm');  
const msg = document.getElementById('msg');  
  
function showMsg(text, type='') {  
  msg.textContent = text;  
  msg.className = type;  
  msg.style.display = text ? 'block' : 'none';  
}  
  
/* ── IN-APP BROWSER DETECTION ── */  
window.addEventListener('load', () => {  
  const ua = navigator.userAgent || '';  
  const isInApp = /TikTok|BytedanceWebview|Instagram|FBAN|FBAV|Twitter|Line|MicroMessenger/i.test(ua);  
  
  if (isInApp) {  
    const googleAuth = document.querySelector('.google-auth');  
    if (googleAuth) {  
      googleAuth.innerHTML = `  
        <div style="  
          background: rgba(255,184,0,0.08);  
          border: 1px solid rgba(255,184,0,0.2);  
          border-radius: 12px;  
          padding: 14px 16px;  
          text-align: center;  
          line-height: 1.8;  
          margin-bottom: 4px;  
        ">  
          <p style="color:#ffb800; font-weight:700; font-size:0.85rem; margin-bottom:10px;">  
            ⚠️ Google Sign-Up doesn't work inside TikTok  
          </p>  
          <button onclick="  
            navigator.clipboard.writeText(window.location.href);  
            this.textContent='✓ Link Copied — Paste in Chrome';  
            this.style.background='rgba(0,232,122,0.1)';  
            this.style.borderColor='rgba(0,232,122,0.3)';  
            this.style.color='#00e87a';  
          " style="  
            background: rgba(0,213,255,0.08);  
            border: 1px solid rgba(0,213,255,0.2);  
            border-radius: 10px;  
            padding: 10px 18px;  
            color: #00d5ff;  
            font-weight: 700;  
            font-size: 0.85rem;  
            cursor: pointer;  
            width: 100%;  
            font-family: inherit;  
          ">  
            Copy Link — Open in Chrome  
          </button>  
          <p style="color:#4a6a85; font-size:0.78rem; margin-top:8px;">  
            Or tap ⋯ top right → Open in browser  
          </p>  
        </div>  
      `;  
    }  
  }  
});  
  
/* ── VISUAL OVERLAY ── */  
function showOverlay() {  
  const overlay = document.createElement('div');  
  overlay.id = 'g-overlay';  
  
  const glow = document.createElement('div');  
  glow.className = 'g-glow';  
  
  const wrap = document.createElement('div');  
  wrap.className = 'g-wrap';  
  
  const ring = document.createElement('div');  
  ring.className = 'g-ring';  
  
  const logo = document.createElement('img');  
  logo.src = 'images/Untitled design.png';  
  logo.alt = 'Logo';  
  logo.className = 'g-logo';  
  
  const checkWrap = document.createElement('div');  
  checkWrap.className = 'g-check-wrap';  
  
  const circle = document.createElement('div');  
  circle.className = 'g-circle';  
  
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');  
  svg.setAttribute('viewBox', '0 0 24 24');  
  svg.classList.add('g-check-svg');  
  
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');  
  path.setAttribute('d', 'M5 13 l5 5 l9 -9');  
  path.classList.add('g-check-path');  
  
  svg.appendChild(path);  
  checkWrap.appendChild(circle);  
  checkWrap.appendChild(svg);  
  wrap.appendChild(ring);  
  wrap.appendChild(logo);  
  wrap.appendChild(checkWrap);  
  overlay.appendChild(glow);  
  overlay.appendChild(wrap);  
  document.body.appendChild(overlay);  
  
  return { overlay, ring, logo, checkWrap, circle, path };  
}  
  
function triggerSuccess({ overlay, ring, logo, checkWrap, circle, path }) {  
  ring.style.transition = 'opacity 0.3s ease';  
  ring.style.opacity = '0';  
  logo.style.transition = 'opacity 0.3s ease';  
  logo.style.opacity = '0';  
  
  setTimeout(() => {  
    checkWrap.style.opacity = '1';  
    circle.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';  
    circle.style.transform = 'scale(1)';  
    circle.style.boxShadow = '0 0 30px rgba(0,232,122,0.6)';  
    path.style.strokeDashoffset = '0';  
  }, 300);  
  
  setTimeout(() => {  
    overlay.style.transition = 'opacity 0.4s ease';  
    overlay.style.opacity = '0';  
    setTimeout(() => overlay.remove(), 400);  
  }, 1600);  
}  
  
/* ── EMAIL SIGNUP ── */  
signupForm.addEventListener('submit', async (e) => {  
  e.preventDefault();  
  
  const name     = document.getElementById('name').value.trim();  
  const email    = document.getElementById('email').value.trim();  
  const password = document.getElementById('password').value;  
  const btn      = signupForm.querySelector('button');  
  
  showMsg('');  
  
  if (!name)               return showMsg('Enter your name', 'error');  
  if (!email)              return showMsg('Enter your email', 'error');  
  if (password.length < 8) return showMsg('Password must be at least 8 characters', 'error');  
  
  btn.disabled = true;  
  
  const elements = showOverlay();  
  
  try {  
    const data = await window.api.signupRequest(name, email, password);  
  
    if (!data?.token) throw new Error('Signup failed');  
  
    window.auth.setToken(data.token);  
  
    triggerSuccess(elements);  
  
    setTimeout(() => {  
      window.location.replace('dashboard.html');  
    }, 1800);  
  
  } catch (err) {  
    elements.overlay.remove();  
    btn.disabled = false;  
    showMsg(err.message || 'Signup failed', 'error');  
  }  
});  
  
/* ── GOOGLE SIGNUP ── */  
async function handleGoogleSignup(response) {  
  showMsg('');  
  
  const elements = showOverlay();  
  
  try {  
    const googleToken = response.credential;  
  
    const res = await fetch(window.api.base + '/api/auth/google', {  
      method: 'POST',  
      headers: { 'Content-Type': 'application/json' },  
      body: JSON.stringify({ token: googleToken })  
    });  
  
    const data = await res.json();  
  
    if (!data?.token) throw new Error('Google signup failed');  
  
    window.auth.setToken(data.token);  
  
    triggerSuccess(elements);  
  
    setTimeout(() => {  
      window.location.replace('dashboard.html');  
    }, 1800);  
  
  } catch (err) {  
    elements.overlay.remove();  
    console.error(err);  
    showMsg('Google signup failed', 'error');  
  }  
}  
  
</script>  </body>
