<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">

<!-- Google Identity -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<header class="header">
<div class="container">
<div class="header-inner">

<div class="brand">
<a href="index.html" style="display:flex;align-items:center;gap:.65rem;min-width:220px;">
<img src="images/Untitled design.png" alt="Logo" class="brand-logo">
<span class="brand-name">Sandile SystemsWorks</span>
</a>
</div>

<div class="header-actions">
<a href="login.html" class="link-muted">Sign in</a>
</div>

</div>
</div>
</header>



<div class="auth-container">
<div class="auth-card">

<div class="auth-head">

<img src="images/Untitled design.png" alt="Logo" class="auth-logo">

<div>
<h1>Create your account</h1>
<p>Start your <strong>3 day free trial</strong> and make smarter decisions.</p>
</div>

</div>


<!-- GOOGLE SIGNUP -->

<div class="google-auth">

<div id="g_id_onload"
data-client_id="1064963647591-k76sv5dgcm3ihrsbmaccr63rij0vikda.apps.googleusercontent.com"
data-context="signup"
data-callback="handleGoogleSignup"
data-auto_prompt="false">
</div>

<div class="google-btn-wrapper">
<div class="g_id_signin"
data-type="standard"
data-size="large"
data-theme="outline"
data-text="continue_with"
data-shape="pill"
data-logo_alignment="left"
data-width="320">
</div>
</div>

</div>


<div class="auth-divider">
or continue with email
</div>


<!-- EMAIL SIGNUP -->

<form id="signupForm">

<div class="form-group">
<label for="name">Full name</label>
<input type="text" id="name" placeholder="Your name" required>
</div>

<div class="form-group">
<label for="email">Email address</label>
<input type="email" id="email" placeholder="your@email.com" required>
</div>

<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" placeholder="Minimum 8 characters" required>
</div>

<button type="submit" class="auth-submit">
Create account
</button>

<p id="msg"></p>

</form>


<div class="auth-footer">
Already have an account?
<a href="login.html">Sign in</a>
</div>

</div>
</div>



<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>



<script>

/* =========================
MESSAGE SYSTEM
========================= */

const signupForm = document.getElementById("signupForm");
const msg = document.getElementById("msg");

function showMsg(text,type=""){

msg.textContent = text;
msg.className = type;
msg.style.display = text ? "block" : "none";

}



/* =========================
EMAIL SIGNUP
========================= */

signupForm.addEventListener("submit", async (e)=>{

e.preventDefault();

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

const btn = signupForm.querySelector("button");

showMsg("");

if(!name) return showMsg("Enter your name","error");

if(!email) return showMsg("Enter your email","error");

if(password.length < 8)
return showMsg("Password must be at least 8 characters","error");


btn.disabled = true;

try{

const data = await window.api.signupRequest(name,email,password);

if(!data?.token)
throw new Error("Signup failed");

window.auth.setToken(data.token);

showMsg("Account created. Redirecting...","success");

setTimeout(()=>{

window.location.replace("dashboard.html");

},800);

}catch(err){

btn.disabled=false;

showMsg(err.message || "Signup failed","error");

}

});



/* =========================
GOOGLE SIGNUP
========================= */

async function handleGoogleSignup(response){

showMsg("");

try{

const googleToken = response.credential;

const res = await fetch(window.api.base + "/api/auth/google",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
token:googleToken
})

});

const data = await res.json();

if(!data?.token)
throw new Error("Google signup failed");

window.auth.setToken(data.token);

window.location.replace("dashboard.html");

}catch(err){

console.error(err);

showMsg("Google signup failed","error");

}

}

</script>

</body>
</html>
