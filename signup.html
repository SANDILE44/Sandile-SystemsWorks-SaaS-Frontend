<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V1M5L4408K"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-V1M5L4408K');
</script>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

.google-real-btn{
width:100%;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:#111;
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
font-size:0.95rem;
}

.google-real-btn:hover{
background:#1a1a1a;
border-color:rgba(255,255,255,0.15);
}

.google-real-btn:active{
transform:scale(.98);
}

/* overlay styles (your original) */

#g-overlay {
position: fixed;
inset: 0;
background: rgba(3,10,20,0.94);
backdrop-filter: blur(10px);
display: flex;
align-items: center;
justify-content: center;
z-index: 9999;
opacity: 0;
animation: gFadeIn 0.35s ease forwards;
}

@keyframes gFadeIn {
to { opacity: 1; }
}

.g-wrap {
position: relative;
width: 110px;
height: 110px;
display: flex;
align-items: center;
justify-content: center;
}

.g-ring {
position: absolute;
inset: 0;
border-radius: 50%;
border: 2.5px solid rgba(0,213,255,0.1);
border-top-color: #00d5ff;
animation: gSpin 0.85s linear infinite;
}

@keyframes gSpin {
to { transform: rotate(360deg); }
}

.g-logo {
width: 56px;
height: 56px;
object-fit: contain;
position: relative;
z-index: 1;
}

</style>

</head>
<body>

<header class="header">
<div class="container">
<div class="header-inner">

<div class="brand">
<a href="index.html" style="display:flex;align-items:center;gap:.65rem;">
<img src="images/Untitled design.png" class="brand-logo">
<span class="brand-name">Sandile SystemsWorks</span>
</a>
</div>

<div class="header-actions">
<a href="login.html" class="link-muted">Sign in</a>
</div>

</div>
</div>
</header>

<div class="auth-container">
<div class="auth-card">

<div class="auth-head">
<img src="images/Untitled design.png" class="auth-logo">
<div>
<h1>Create your account</h1>
<p>Start your <strong>3 day free trial</strong></p>
</div>
</div>

<!-- GOOGLE -->
<div class="google-auth">

<div id="g_id_onload"
data-client_id="1064963647591-k76sv5dgcm3ihrsbmaccr63rij0vikda.apps.googleusercontent.com"
data-context="signup"
data-callback="handleGoogleSignup"
data-auto_prompt="false">
</div>

<button id="googleCustomBtn" class="google-real-btn">
<svg width="18" height="18" viewBox="0 0 24 24">
<path fill="#fff"
d="M21.35 11.1H12v2.92h5.37c-.23 1.27-1.4 3.73-5.37 3.73-3.23 0-5.86-2.67-5.86-5.96s2.63-5.96 5.86-5.96c1.84 0 3.07.78 3.77 1.45l2.58-2.5C16.77 3.34 14.65 2.5 12 2.5 6.76 2.5 2.5 6.77 2.5 12s4.26 9.5 9.5 9.5c5.48 0 9.12-3.85 9.12-9.27 0-.62-.07-1.08-.17-1.53z"/>
</svg>
Continue with Google
</button>

</div>

<div class="auth-divider">or continue with email</div>

<form id="signupForm">

<div class="form-group">
<label>Full name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="auth-submit">
Create account
</button>

<p id="msg"></p>

</form>

</div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>

/* instant google button */

document.getElementById("googleCustomBtn")
.addEventListener("click", () => {

google.accounts.id.initialize({
client_id:
"1064963647591-k76sv5dgcm3ihrsbmaccr63rij0vikda.apps.googleusercontent.com",
callback: handleGoogleSignup
});

google.accounts.id.prompt();

});

/* overlay */

function showOverlay(){

const overlay=document.createElement('div');
overlay.id='g-overlay';

const wrap=document.createElement('div');
wrap.className='g-wrap';

const ring=document.createElement('div');
ring.className='g-ring';

const logo=document.createElement('img');
logo.src='images/Untitled design.png';
logo.className='g-logo';

wrap.appendChild(ring);
wrap.appendChild(logo);
overlay.appendChild(wrap);

document.body.appendChild(overlay);

return overlay;

}

/* email signup */

signupForm.addEventListener('submit', async e=>{
e.preventDefault();

const overlay=showOverlay();

try{

const data=await window.api.signupRequest(
name.value,
email.value,
password.value
);

window.auth.setToken(data.token);

location.href='dashboard.html';

}catch(err){
overlay.remove();
msg.textContent="Signup failed";
}

});

/* google signup */

async function handleGoogleSignup(response){

const overlay=showOverlay();

try{

const res=await fetch(
window.api.base+'/api/auth/google',
{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
token:response.credential
})
}
);

const data=await res.json();

window.auth.setToken(data.token);

location.href='dashboard.html';

}catch(err){
overlay.remove();
msg.textContent="Google signup failed";
}

}

</script>

</body>
</html>
