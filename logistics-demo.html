<script>
    /* DROPDOWN */
    const customSelect = document.getElementById('customSelect');
    const csSelected   = document.getElementById('csSelected');
    const csOptions    = document.getElementById('csOptions');
    const emptyState   = document.getElementById('emptyState');

    csSelected.addEventListener('click', (e) => {
      e.stopPropagation();
      csOptions.classList.toggle('open');
      customSelect.classList.toggle('open');
    });

    document.addEventListener('click', () => {
      csOptions.classList.remove('open');
      customSelect.classList.remove('open');
    });

    document.querySelectorAll('.cs-option').forEach(opt => {
      opt.addEventListener('click', () => {
        csSelected.textContent = opt.textContent;
        csOptions.classList.remove('open');
        customSelect.classList.remove('open');
        document.querySelectorAll('.demo-panel').forEach(p => p.classList.remove('active'));
        emptyState.style.display = 'none';
        const panel = document.getElementById('panel-' + opt.dataset.value);
        if (panel) panel.classList.add('active');
      });
    });

    /* HELPERS */
    const R = n => 'R ' + (isNaN(n) ? '0.00' : n.toLocaleString('en-ZA', {
      minimumFractionDigits: 2, maximumFractionDigits: 2
    }));

    function setVerdict(el, profit, hasData) {
      if (!el) return;
      el.className = 'verdict';
      if (!hasData) { el.textContent = 'Enter your numbers above to get a decision'; return; }
      if (profit > 0) {
        el.classList.add('approve');
        el.textContent = '✅ APPROVE — Profitable. Sign up to unlock full margin & ROI breakdown.';
      } else if (profit === 0) {
        el.classList.add('review');
        el.textContent = '⚠️ REVIEW — Breaking even. Any unexpected cost puts you in the red.';
      } else {
        el.classList.add('reject');
        el.textContent = '🚫 REJECT — This deal loses money. Sign up to see exactly where.';
      }
    }

    /* SHIPMENT */
    ['s-quote','s-fuel','s-driver','s-tolls','s-other'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', calcShipment);
    });
    function calcShipment() {
      const quote  = +document.getElementById('s-quote').value  || 0;
      const costs  = (+document.getElementById('s-fuel').value   || 0)
                   + (+document.getElementById('s-driver').value || 0)
                   + (+document.getElementById('s-tolls').value  || 0)
                   + (+document.getElementById('s-other').value  || 0);
      const profit = quote - costs;
      document.getElementById('s-total').textContent  = R(costs);
      document.getElementById('s-profit').textContent = R(profit);
      setVerdict(document.getElementById('s-verdict'), profit, quote > 0);
    }

    /* OPERATIONS */
    ['o-shipments','o-revenue','o-fuel','o-labor','o-fixed'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', calcOperations);
    });
    function calcOperations() {
      const shipments = +document.getElementById('o-shipments').value || 0;
      const revenue   = +document.getElementById('o-revenue').value   || 0;
      const fuel      = +document.getElementById('o-fuel').value      || 0;
      const labor     = +document.getElementById('o-labor').value     || 0;
      const fixed     = +document.getElementById('o-fixed').value     || 0;
      const totalRev  = shipments * revenue;
      const totalCost = fuel + labor + fixed;
      const profit    = totalRev - totalCost;
      document.getElementById('o-total-rev').textContent  = R(totalRev);
      document.getElementById('o-total-cost').textContent = R(totalCost);
      document.getElementById('o-profit').textContent     = R(profit);
      setVerdict(document.getElementById('o-verdict'), profit, totalRev > 0);
    }

    /* FREIGHT */
    ['f-quote','f-cargo','f-freight','f-duty','f-customs','f-insurance'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', calcFreight);
    });
    function calcFreight() {
      const quote    = +document.getElementById('f-quote').value     || 0;
      const cargo    = +document.getElementById('f-cargo').value     || 0;
      const freight  = +document.getElementById('f-freight').value   || 0;
      const dutyRate = +document.getElementById('f-duty').value      || 0;
      const customs  = +document.getElementById('f-customs').value   || 0;
      const insRate  = +document.getElementById('f-insurance').value || 0;
      const dutyCost = cargo * (dutyRate / 100);
      const insCost  = cargo * (insRate / 100);
      const total    = freight + dutyCost + insCost + customs;
      const profit   = quote - total;
      document.getElementById('f-duty-cost').textContent = R(dutyCost);
      document.getElementById('f-total').textContent     = R(total);
      document.getElementById('f-profit').textContent    = R(profit);
      setVerdict(document.getElementById('f-verdict'), profit, quote > 0);
    }
  </script>
</body>
</html>
