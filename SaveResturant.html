<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Saved Deals - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/styles.css" />

<style>

/* ================= PAGE LAYOUT ================= */
.saved-wrapper {
  margin-left: 260px;
  padding: 2rem;
  color: #e5e7eb;
}

h1 {
  margin-bottom: 1rem;
}

/* ================= GRID ================= */
.deals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}

/* ================= CARD ================= */
.deal-card {
  background: #0b1220;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 1rem;
  transition: 0.2s ease;
}

.deal-card:hover {
  transform: translateY(-3px);
  border-color: rgba(0,180,216,0.4);
}

.deal-title {
  font-weight: 800;
  color: #00b4d8;
  margin-bottom: 0.6rem;
  font-size: 0.9rem;
}

.deal-body {
  font-size: 0.85rem;
  line-height: 1.6;
  opacity: 0.9;
}

/* ================= BUTTON ================= */
.delete-btn {
  margin-top: 1rem;
  width: 100%;
  padding: 0.6rem;
  border-radius: 10px;
  border: 1px solid rgba(255,0,0,0.3);
  background: rgba(255,0,0,0.1);
  color: #ff6b6b;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s ease;
}

.delete-btn:hover {
  background: rgba(255,0,0,0.2);
  transform: translateY(-2px);
}

/* ================= EMPTY STATE ================= */
.empty {
  padding: 2rem;
  text-align: center;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="saved-wrapper">

  <h1>Saved Deals</h1>

  <div id="savedDealsContainer" class="deals-grid"></div>

  <div id="emptyState" class="empty" style="display:none;">
    No saved deals yet.
  </div>

</div>

<script>
(() => {

const $ = id => document.getElementById(id);

/* ================= API ================= */
async function api(url, method = "GET", body = null) {

  const token = localStorage.getItem("token");
  if (!token) return location.replace("login.html");

  try {

    const res = await fetch(`API_BASE${url}`, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: body ? JSON.stringify(body) : null
    });

    if (res.status === 401) {
      localStorage.removeItem("token");
      return location.replace("login.html");
    }

    return await res.json();

  } catch (err) {
    console.error("SavedDeals error:", err);
    return null;
  }
}

/* ================= LOAD DEALS ================= */
async function loadDeals() {
  return await api("/api/saved-deals");
}

/* ================= DELETE DEAL ================= */
async function deleteDeal(id) {
  await api(`/api/saved-deals/${id}`, "DELETE");
  initSavedDeals();
}

/* ================= RENDER ================= */
function renderDeals(deals) {

  const container = $("savedDealsContainer");
  const empty = $("emptyState");

  if (!deals || deals.length === 0) {
    container.innerHTML = "";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  container.innerHTML = deals.map(d => `
    <div class="deal-card">
      
      <div class="deal-title">
        ${d.type.toUpperCase()} - ${new Date(d.createdAt).toLocaleDateString()}
      </div>

      <div class="deal-body">
        <div><strong>Profit:</strong> ${d.results?.profit ?? 0}</div>
        <div><strong>Revenue:</strong> ${d.results?.monthlyRevenue ?? 0}</div>
        <div><strong>Margin:</strong> ${d.results?.margin ?? 0}%</div>
      </div>

      <button class="delete-btn" data-id="${d._id}">
        Delete
      </button>

    </div>
  `).join("");
}

/* ================= INIT ================= */
async function initSavedDeals() {
  const deals = await loadDeals();
  renderDeals(deals);
}

/* ================= CLICK HANDLER ================= */
document.addEventListener("click", async (e) => {
  if (e.target.classList.contains("delete-btn")) {
    const id = e.target.dataset.id;
    await deleteDeal(id);
  }
});

/* ================= START ================= */
document.addEventListener("DOMContentLoaded", initSavedDeals);

})();
</script>

</body>
</html>
