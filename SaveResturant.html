<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Saved Deals - Sandile SystemsWorks</title>

<link rel="stylesheet" href="css/styles.css" />

<style>
.saved-wrapper {
  margin-left: 260px;
  padding: 2rem;
  color: #e5e7eb;
}

h1 {
  margin-bottom: 1rem;
}

.deals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}

.deal-card {
  background: #0b1220;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 1rem;
}

.deal-title {
  font-weight: 800;
  color: #00b4d8;
  margin-bottom: 0.6rem;
  font-size: 0.9rem;
}

.deal-body {
  font-size: 0.85rem;
  line-height: 1.6;
  opacity: 0.9;
}

.delete-btn {
  margin-top: 1rem;
  width: 100%;
  padding: 0.6rem;
  border-radius: 10px;
  border: 1px solid rgba(255,0,0,0.3);
  background: rgba(255,0,0,0.1);
  color: #ff6b6b;
  font-weight: 700;
  cursor: pointer;
}

.empty {
  padding: 2rem;
  text-align: center;
  opacity: 0.6;
}
</style>

</head>

<body>

<div class="saved-wrapper">

  <h1>Saved Deals</h1>

  <div id="savedDealsContainer" class="deals-grid"></div>

  <div id="emptyState" class="empty" style="display:none;">
    No saved deals yet.
  </div>

</div>

<script>
(() => {

const $ = (id) => document.getElementById(id);

const API_BASE = "https://sandile-systemsworks-saas-backend-2.onrender.com";

/* ================= SAFE API ================= */
async function api(url, method = "GET", body = null) {

  const token = localStorage.getItem("token");
  if (!token) {
    location.replace("login.html");
    return null;
  }

  try {
    const res = await fetch(`${API_BASE}${url}`, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: body ? JSON.stringify(body) : null
    });

    if (res.status === 401) {
      localStorage.removeItem("token");
      location.replace("login.html");
      return null;
    }

    if (!res.ok) {
      console.error("API Error:", res.status);
      return null;
    }

    return await res.json();

  } catch (err) {
    console.error("Network error:", err);
    return null;
  }
}

/* ================= LOAD ================= */
async function loadDeals() {
  return await api("/api/saved-deals");
}

/* ================= DELETE ================= */
async function deleteDeal(id) {
  await api(`/api/saved-deals/${id}`, "DELETE");
  await initSavedDeals();
}

/* ================= RENDER ================= */
function renderDeals(deals) {

  const container = $("savedDealsContainer");
  const empty = $("emptyState");

  if (!container || !empty) return;

  if (!deals || deals.length === 0) {
    container.innerHTML = "";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  container.innerHTML = deals.map(d => {

    const type = (d.type || "unknown").toUpperCase();
    const date = d.createdAt ? new Date(d.createdAt).toLocaleDateString() : "—";

    return `
      <div class="deal-card">

        <div class="deal-title">
          ${type} - ${date}
        </div>

        <div class="deal-body">
          <div><strong>Profit:</strong> ${d?.results?.profit ?? 0}</div>
          <div><strong>Revenue:</strong> ${d?.results?.monthlyRevenue ?? 0}</div>
          <div><strong>Margin:</strong> ${d?.results?.margin ?? 0}%</div>
        </div>

        <button class="delete-btn" data-id="${d._id}">
          Delete
        </button>

      </div>
    `;
  }).join("");
}

/* ================= INIT ================= */
async function initSavedDeals() {
  const deals = await loadDeals();
  renderDeals(deals);
}

/* ================= EVENTS ================= */
document.addEventListener("click", async (e) => {

  const btn = e.target.closest(".delete-btn");
  if (!btn) return;

  const id = btn.dataset.id;
  if (!id) return;

  await deleteDeal(id);
});

/* ================= START ================= */
document.addEventListener("DOMContentLoaded", initSavedDeals);

})();
</script>

</body>
</html>
