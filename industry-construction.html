<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Construction Profitability Engine</title>

<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/calculators.css" />

<style>

/* ================= DECISION ENGINE ================= */

#decision-status {
  font-weight: 800;
  font-size: 1rem;
}

#decision-status.positive { color: #22c55e; }
#decision-status.caution { color: #f59e0b; }
#decision-status.negative { color: #ef4444; }

/* OUTPUT COLORS */
.output-value {
  font-weight: 600;
}

.output-value.positive { color: #22c55e; }
.output-value.negative { color: #ef4444; }

/* DROPDOWN INSIGHTS */
.insights-container details {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 10px;
}

.insights-container summary {
  cursor: pointer;
  font-weight: 700;
}

/* STEP BLOCK */
.step {
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.02);
}

</style>

</head>

<body>

<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">

  <div class="sidebar-top">

    <div class="sidebar-brand">
      <img src="images/Untitled design.png" class="sidebar-logo" />
      <span class="sidebar-name">Sandile SystemsWorks</span>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="sector-secondary.html" class="active">Construction Tool</a>
      <hr class="sidebar-divider" />
      <a href="#">Saved Deals</a>
      <a href="#">History</a>
      <a href="#">Export</a>
    </nav>

  </div>

</aside>

<!-- MAIN -->
<main class="main-content">

<h1>Construction Profitability Engine</h1>
<p>Project cost, margin and contract intelligence system.</p>

<div class="calculator-container">

<div class="calculator-grid">

<!-- INPUTS -->
<div class="input-section">

<h3>Inputs</h3>

<div class="input-group">
  <label>Contract Value</label>
  <input id="const-value" type="number" />
</div>

<div class="input-group">
  <label>Material Cost</label>
  <input id="const-material" type="number" />
</div>

<div class="input-group">
  <label>Labor Cost</label>
  <input id="const-labor" type="number" />
</div>

<div class="input-group">
  <label>Equipment Cost</label>
  <input id="const-equipment" type="number" />
</div>

<div class="input-group">
  <label>Fixed Costs</label>
  <input id="const-fixed" type="number" />
</div>

<div class="input-group">
  <label>Duration (months)</label>
  <input id="const-duration" type="number" />
</div>

<button id="resetBtn">Reset</button>

</div>

<!-- OUTPUTS -->
<div class="output-section">

<h3>Decision</h3>

<div id="decision-status">—</div>
<div id="decision-advice"></div>

<h3>Key Metrics</h3>

<div id="const-total-costs" class="output-value">—</div>
<div id="const-profit" class="output-value">—</div>
<div id="const-margin" class="output-value">—</div>
<div id="const-roi" class="output-value">—</div>

<h3>Break-even</h3>
<div id="const-breakeven" class="output-value">—</div>

<div id="const-monthly-profit" class="output-value">—</div>
<div id="const-annual-profit" class="output-value">—</div>

<!-- DROPDOWN INSIGHTS (NEW STRUCTURE) -->
<h3>Insights</h3>
<div id="const-insights" class="insights-container"></div>

</div>

</div>

</div>

</main>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/guard.js"></script>
<script src="js/auth.js"></script>
<script src="js/construction.js"></script>
<script src="js/hamburger.js"></script>
<script src="js/user-display.js"></script>

</body>
</html>
